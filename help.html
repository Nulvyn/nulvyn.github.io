<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nulvyn Visuals</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #484d4f;
      color: #f5f5f5;
    }
    header {
      background: black;
      color: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 40px;
    }
    header a {
      color: white;
      text-decoration: none;
      margin-left: 20px;
    }
    .hero {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 5px;
    }
    .hero img {
      width: 100%;
      height: auto;
    }
    .hero-text {
      position: absolute;
      top: 40%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: white;
      font-size: 2.5rem;
      font-weight: bold;
    }
    section {
      padding: 60px 10%;
    }
    .services {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 30px;
    }
    .service {
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }
    .service img {
      width: 100%;
      border-radius: 12px;
    }
    .contact-form {
      max-width: 600px;
      margin: auto;
    }
    .contact-form input, 
    .contact-form textarea {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: 1px solid #ccc;
      border-radius: 6px;
    }
    .contact-form button {
      padding: 12px 24px;
      background: black;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    footer {
      background: #484d4f;
      padding: 20px 10%;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
  </style>
</head>
<body>

  <header>
    <h2>Typer Help</h2>
    <nav>
        <a href="index.html">Main Site</a>
    </nav>
  </header>

  <!-- CONTACT SECTION -->
  <section id="contact">
    <h2>Contact Us For Support</h2>
    <p>If you need support contact us with the form below</p>

    <form class="contact-form" action="https://formspree.io/f/mvzvgkje" method="POST">
      <input type="text" name="first" placeholder="First Name" required>
      <input type="text" name="last" placeholder="Last Name" required>
      <input type="email" name="email" placeholder="Email" required>
      <textarea name="message" rows="6" placeholder="Message" required></textarea>
      <button type="submit">Send</button>
    </form>
  </section>

  <footer>
    <p>© Nulvyn | Made by Kuba Kieca</p>
  </footer>
    </body>
</html>
